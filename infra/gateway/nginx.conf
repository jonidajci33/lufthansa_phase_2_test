# Generate a unique request ID if the client doesn't send one
map $http_x_correlation_id $correlation_id {
    default $http_x_correlation_id;
    ""      $request_id;
}

server {
    listen 8080;
    server_name _;

    absolute_redirect off;

    # Use Docker's embedded DNS resolver so hostnames are re-resolved
    # on each request. Without this, nginx caches IPs at startup and
    # gets stale IPs when containers restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- Block internal service-to-service routes ---
    location /internal/ {
        return 403 '{"error":"Forbidden","message":"Internal endpoints are not accessible via the gateway"}';
        add_header Content-Type application/json always;
    }

    # --- CORS (permissive for local dev) ---
    add_header Access-Control-Allow-Origin  * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Correlation-Id" always;
    add_header Access-Control-Expose-Headers "X-Correlation-Id" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # --- Identity Service ---
    location /api/v1/auth {
        set $identity_upstream http://identity-service:8081;
        proxy_pass $identity_upstream;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }
    location /api/v1/users {
        set $identity_upstream http://identity-service:8081;
        proxy_pass $identity_upstream;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # --- Estimation Service (story/reorder endpoints nested under /rooms) ---
    location ~ ^/api/v1/rooms/[^/]+/stories {
        set $estimation_upstream http://estimation-service:8083;
        proxy_pass $estimation_upstream;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # --- Room Service ---
    location /api/v1/rooms/join {
        set $room_upstream http://room-service:8082;
        proxy_pass $room_upstream;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }
    location /api/v1/rooms {
        set $room_upstream http://room-service:8082;
        proxy_pass $room_upstream;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }
    location /api/v1/invitations {
        set $room_upstream http://room-service:8082;
        proxy_pass $room_upstream;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }
    location /api/v1/deck-types {
        set $room_upstream http://room-service:8082;
        proxy_pass $room_upstream;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # --- Estimation Service (REST) ---
    location /api/v1/stories {
        set $estimation_upstream http://estimation-service:8083;
        proxy_pass $estimation_upstream;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }
    location /api/v1/votes {
        set $estimation_upstream http://estimation-service:8083;
        proxy_pass $estimation_upstream;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # --- Estimation Service (WebSocket) ---
    location /ws/estimation {
        set $estimation_upstream http://estimation-service:8083;
        proxy_pass $estimation_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-Id $correlation_id;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 86400;
    }

    # --- Notification Service ---
    location /api/v1/notifications {
        set $notification_upstream http://notification-service:8084;
        proxy_pass $notification_upstream;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # --- Audit Service ---
    location /api/v1/audit {
        set $audit_upstream http://audit-service:8085;
        proxy_pass $audit_upstream;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # --- Health check endpoint ---
    location /health {
        return 200 '{"status":"UP"}';
        add_header Content-Type application/json;
    }

    # --- Swagger UI (per-service) ---
    location /swagger-ui.html {
        set $identity_upstream http://identity-service:8081;
        proxy_pass $identity_upstream;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }
}
