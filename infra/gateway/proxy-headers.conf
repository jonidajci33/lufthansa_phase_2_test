# Shared proxy headers for all backend routes
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Authorization     $http_authorization;

# Correlation ID for distributed tracing (Jaeger / OpenTelemetry)
# Uses client-provided X-Correlation-Id if present, otherwise generates one from $request_id
proxy_set_header X-Correlation-Id  $correlation_id;

# Pass the correlation ID back to the client in the response
add_header X-Correlation-Id $correlation_id always;
