<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>You've Been Invited!</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px; padding: 40px; }
        h1 { color: #333333; }
        p { color: #666666; line-height: 1.6; }
        .btn { display: inline-block; padding: 12px 24px; background-color: #2196F3; color: #ffffff; text-decoration: none; border-radius: 4px; margin-top: 20px; }
        .footer { margin-top: 40px; font-size: 12px; color: #999999; }
    </style>
</head>
<body>
<div class="container">
    <h1>You've Been Invited!</h1>
    <p>You have been invited to join <strong th:text="${roomName}">a Planning Poker room</strong>.</p>
    <p>Click the button below to accept the invitation and join the room.</p>
    <a th:href="${joinLink}" class="btn">Accept Invitation</a>
    <div class="footer">
        <p>This invitation link expires in 7 days. If you did not expect this invitation, please ignore this email.</p>
    </div>
</div>
</body>
</html>
