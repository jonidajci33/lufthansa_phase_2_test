# ============================================================
# Planning Poker - Room Service
# ============================================================
server:
  port: 8082
  shutdown: graceful

spring:
  application:
    name: room-service
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # --- Datasource ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/room_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # --- Flyway (runs BEFORE JPA — creates schema and tables) ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: room
    create-schemas: true
    baseline-on-migrate: true

  # --- JPA (validate only — Flyway owns the schema) ---
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: room
        format_sql: true
    defer-datasource-initialization: false

  # --- Security: OAuth2 Resource Server ---
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/planning-poker}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/planning-poker/protocol/openid-connect/certs}

  # --- Kafka Producer ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        spring.json.add.type.headers: false

# --- Actuator ---
management:
  server:
    port: 18082
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,5s

# --- OpenTelemetry Tracing ---
opentelemetry:
  tracing:
    export:
      otlp:
        endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}

otel:
  resource:
    attributes:
      service.name: ${spring.application.name}
      service.version: ${APP_VERSION:0.0.1}
      deployment.environment: ${SPRING_PROFILES_ACTIVE:local}

# --- SpringDoc / Swagger ---
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# --- Logging ---
logging:
  level:
    root: INFO
    com.planningpoker.room: DEBUG
    org.springframework: INFO
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  structured:
    format:
      console: logstash

# --- Application Properties ---
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  services:
    identity-url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
