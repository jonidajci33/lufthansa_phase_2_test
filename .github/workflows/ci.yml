# CI Pipeline for Planning Poker Platform
# Follows: DOCKER_CICD_STANDARD.md, OBSERVABILITY_STANDARD.md

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ── Job 1: Build, Test, Coverage ──────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: planning_poker_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build and test all services
        run: mvn verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/planning_poker_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

      - name: Check JaCoCo coverage threshold (70%)
        run: |
          FAILED=false
          for report in $(find . -path "*/target/site/jacoco/jacoco.xml" -type f); do
            SERVICE=$(echo "$report" | cut -d'/' -f2)
            if [ "$SERVICE" = "shared-kernel" ] || [ "$SERVICE" = "test-fixtures" ]; then
              continue
            fi
            COVERED=$(grep -oP 'type="INSTRUCTION".*?covered="\K\d+' "$report" | tail -1)
            MISSED=$(grep -oP 'type="INSTRUCTION".*?missed="\K\d+' "$report" | tail -1)
            if [ -z "$COVERED" ] || [ -z "$MISSED" ]; then
              echo "::warning::Could not parse coverage for $SERVICE"
              continue
            fi
            TOTAL=$((COVERED + MISSED))
            if [ "$TOTAL" -eq 0 ]; then
              echo "::warning::No instruction coverage data for $SERVICE"
              continue
            fi
            PCT=$((COVERED * 100 / TOTAL))
            echo "$SERVICE coverage: ${PCT}%"
            if [ "$PCT" -lt 70 ]; then
              echo "::error::$SERVICE coverage ${PCT}% is below the 70% threshold"
              FAILED=true
            fi
          done
          if [ "$FAILED" = "true" ]; then
            exit 1
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/
          retention-days: 7

  # ── Job 2: SonarQube Analysis ─────────────────────────────
  sonar:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: planning_poker_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build with coverage for Sonar
        run: mvn verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/planning_poker_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

      - name: SonarQube analysis
        run: >
          mvn sonar:sonar -B
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.projectKey=planning-poker
          -Dsonar.projectName=Planning\ Poker\ Platform
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube quality gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── Job 3: Docker Build & Push ────────────────────────────
  docker:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - identity-service
          - room-service
          - estimation-service
          - notification-service
          - audit-service

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ── Job 4: Integration Tests ──────────────────────────────
  integration-test:
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start services with Docker Compose
        run: |
          docker compose -f docker-compose.yml -f docker-compose.integration.yml up -d --wait --timeout 120
        env:
          IMAGE_TAG: ${{ github.sha }}

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for all services to report healthy..."
          TIMEOUT=120
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            HEALTHY=$(docker compose ps --format json | grep -c '"Health":"healthy"' || true)
            TOTAL=$(docker compose ps --format json | wc -l)
            echo "Healthy: $HEALTHY / $TOTAL (${ELAPSED}s elapsed)"
            if [ "$HEALTHY" -ge "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
              echo "All services healthy."
              break
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "::error::Services did not become healthy within ${TIMEOUT}s"
            docker compose logs
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run integration tests
        run: mvn verify -pl test-fixtures -B -Dtest.integration=true
        env:
          API_BASE_URL: http://localhost:8080

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose logs > integration-test-logs.txt 2>&1

      - name: Upload integration test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: integration-test-logs.txt
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.integration.yml down -v
