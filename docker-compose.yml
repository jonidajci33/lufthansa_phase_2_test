# docker-compose.yml — PlanningPoker Full Stack
# One-command startup: docker compose up --build
# Teardown: docker compose down -v

networks:
  planningpoker-net:
    driver: bridge

volumes:
  pg-data:
  kc-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:
  # ================================================================
  # DATA LAYER
  # ================================================================

  postgres:
    image: postgres:16-alpine
    container_name: pp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-planningpoker}
      POSTGRES_USER: ${POSTGRES_USER:-ppuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pppass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks:
      - planningpoker-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ppuser} -d ${POSTGRES_DB:-planningpoker}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - planningpoker-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ================================================================
  # AUTH LAYER
  # ================================================================

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: pp-keycloak
    command: >
      start-dev
      --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-planningpoker}
      KC_DB_USERNAME: ${POSTGRES_USER:-ppuser}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-pppass}
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "${KC_PORT:-8180}:8080"
    volumes:
      - kc-data:/opt/keycloak/data
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/planningpoker-realm.json:ro
    networks:
      - planningpoker-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/localhost/9000) 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  # Runs once after Keycloak starts to:
  # 1. Add protocol mappers (sub, email, preferred_username) to the SPA client
  # 2. Create the platform admin user from env vars (no hardcoded passwords)
  keycloak-init:
    image: curlimages/curl:latest
    container_name: pp-keycloak-init
    entrypoint: ["/bin/sh", "/scripts/ensure-mappers.sh"]
    environment:
      KC_URL: http://keycloak:8080
      KC_ADMIN: ${KC_ADMIN:-admin}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      PP_ADMIN_USERNAME: ${PP_ADMIN_USERNAME:-}
      PP_ADMIN_PASSWORD: ${PP_ADMIN_PASSWORD:-}
      PP_ADMIN_EMAIL: ${PP_ADMIN_EMAIL:-admin@planningpoker.local}
    volumes:
      - ./infra/keycloak/ensure-mappers.sh:/scripts/ensure-mappers.sh:ro
    networks:
      - planningpoker-net
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"

  # ================================================================
  # MESSAGING LAYER
  # ================================================================

  kafka:
    image: apache/kafka:3.9.0
    container_name: pp-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "${KAFKA_PORT:-29092}:29092"
    networks:
      - planningpoker-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s

  # ================================================================
  # OBSERVABILITY LAYER
  # ================================================================

  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: pp-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    networks:
      - planningpoker-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:16686/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: pp-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - planningpoker-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.1.0
    container_name: pp-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - planningpoker-net
    depends_on:
      - prometheus
      - jaeger
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================================================
  # DEV TOOLS
  # ================================================================

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: pp-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - planningpoker-net

  # ================================================================
  # APPLICATION LAYER
  # ================================================================

  # ── API Gateway (nginx reverse proxy) ───────────────────────────
  gateway:
    image: nginx:1.27-alpine
    container_name: pp-gateway
    volumes:
      - ./infra/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/gateway/proxy-headers.conf:/etc/nginx/conf.d/proxy-headers.conf:ro
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    networks:
      - planningpoker-net
    depends_on:
      - identity-service
      - room-service
      - estimation-service
      - notification-service
      - audit-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Identity Service ────────────────────────────────────────────
  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    container_name: pp-identity
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/identity_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ppuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pppass}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/planning-poker
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/planning-poker/protocol/openid-connect/certs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
    # No host ports — only reachable via nginx gateway or Docker network
    networks:
      - planningpoker-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18081/actuator/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ──Room Service ────────────────────────────────────────────────
  room-service:
    build:
      context: .
      dockerfile: room-service/Dockerfile
    container_name: pp-room
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/room_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ppuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pppass}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/planning-poker
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/planning-poker/protocol/openid-connect/certs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
    networks:
      - planningpoker-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18082/actuator/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ──Estimation Service ──────────────────────────────────────────
  estimation-service:
    build:
      context: .
      dockerfile: estimation-service/Dockerfile
    container_name: pp-estimation
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/estimation_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ppuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pppass}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/planning-poker
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/planning-poker/protocol/openid-connect/certs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      ROOM_SERVICE_URL: http://room-service:8082
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
    networks:
      - planningpoker-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18083/actuator/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ──Notification Service ────────────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: pp-notification
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ppuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pppass}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/planning-poker
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/planning-poker/protocol/openid-connect/certs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ROOM_SERVICE_URL: http://room-service:8082
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_AUTH: "false"
      SMTP_STARTTLS: "false"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    networks:
      - planningpoker-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18084/actuator/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ──Audit Service ───────────────────────────────────────────────
  audit-service:
    build:
      context: .
      dockerfile: audit-service/Dockerfile
    container_name: pp-audit
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/audit_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ppuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pppass}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/planning-poker
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/planning-poker/protocol/openid-connect/certs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
    networks:
      - planningpoker-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18085/actuator/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ================================================================
  # FRONTEND
  # ================================================================

  # ── React 19 SPA (B&W Animated) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pp-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - planningpoker-net
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
